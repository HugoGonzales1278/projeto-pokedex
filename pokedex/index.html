<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokédex Adventure</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="design.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">Poké<span>Dex</span></div>
    <div class="controls">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Buscar Pokémon...">
      </div>
    </div>
  </div>
  <div class="type-filters" id="typeFilters"></div>
</header>

<div class="stats-bar">
  <div class="stats-inner">
    <span>Total: <strong id="totalCount">0</strong> Pokémons</span>
    <span>Capturados: <strong id="caughtCount">0</strong> 🏆</span>
  </div>
</div>

<main>
  <div class="pokemon-grid" id="grid">
    <div class="loading">
      <div class="pokeball-spin">⚪</div>
      Carregando Pokédex...
    </div>
  </div>
</main>

<!-- Detail Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" id="closeBtn">✕</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script src="list.js">
</script>
</body>
</html>
